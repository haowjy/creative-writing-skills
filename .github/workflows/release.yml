name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install meridian
        run: |
          curl -fsSL https://raw.githubusercontent.com/haowjy/meridian-channel/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Validate package structure
        run: meridian mars check

      - name: Verify mars.lock is fresh
        run: |
          meridian mars sync
          if ! git diff --quiet mars.lock; then
            echo "::error::mars.lock is out of date. Run 'meridian mars sync' and commit the result."
            git diff mars.lock
            exit 1
          fi

      - name: Validate YAML frontmatter
        run: |
          error=0
          for f in agents/*.md skills/*/SKILL.md cw/skills/*/SKILL.md cw/cw-router/SKILL.md; do
            if [ -f "$f" ]; then
              if ! head -1 "$f" | grep -q '^---'; then
                echo "::error file=$f::Missing YAML frontmatter"
                error=1
              fi
            fi
          done
          exit $error

      - name: Verify tag matches mars.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          toml_version=$(grep '^version' mars.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$tag" != "v$toml_version" ]; then
            echo "::error::Tag $tag does not match mars.toml version $toml_version"
            exit 1
          fi

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Claude.ai skill packages
        run: python3 scripts/create_skill_zips.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: zips/*.skill
