name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install meridian
        run: |
          uv tool install meridian-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate package structure
        run: meridian mars check

      - name: Validate Claude plugin manifest
        run: claude plugins validate .claude-plugin/marketplace.json

      - name: Validate cw plugin (manifest + components)
        run: claude plugins validate cw

      - name: Validate YAML frontmatter
        run: |
          error=0
          for f in agents/*.md skills/*/SKILL.md cw/skills/*/SKILL.md; do
            if [ -f "$f" ]; then
              if ! head -1 "$f" | grep -q '^---'; then
                echo "::error file=$f::Missing YAML frontmatter"
                error=1
              fi
            fi
          done
          exit $error

      - name: Check cw skill sync (drift + leaked Meridian vocab)
        run: python3 scripts/sync_cw_skills.py

      - name: Build Claude.ai skill packages
        run: python3 scripts/create_skill_zips.py
